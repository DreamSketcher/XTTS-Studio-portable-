name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint-and-format:
    name: Code Quality (Ruff & Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          # Версии закреплены, чтобы CI был воспроизводим и совпадал с pre-commit
          pip install ruff==0.6.9 black==24.10.0

      - name: Run Black formatter check
        run: black --check .

      - name: Run Ruff linter
        run: ruff check .

  tests:
    name: Pytest Suite (CPU)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
            pip install -r requirements.txt || true
          fi
          pip install pytest pytest-cov pytest-timeout ruff==0.6.9 black==24.10.0
        shell: bash

      - name: Run pytest
        run: |
          pytest test/ --ignore=test/test_local_llm_client_download.py -v
        shell: bash
