# .security/pip-audit-allowlist.yml
#
# Allowlist для блокирующего security-gate (tools/pip_audit_gate.py, TASK-001).
#
# Политика gate:
#   Critical/High → fail, КРОМЕ уязвимостей, перечисленных здесь;
#   Medium/Low    → warning (не fail).
# Кроме того, CI падает, если хотя бы одна запись здесь просрочена (expires_at).
#
# ВАЖНО (отклонение от буквального «Critical → fail всегда», зафиксировано в
# docs/SECURITY.md): замороженный ML-стек (torch==2.2.2, transformers==4.38.2 —
# источник правды из TASK-002) физически несёт Critical CVE без совместимого
# фикса в ближайшем квартале (бамп torch/transformers ломает XTTS v2 + RVC).
# Поэтому Critical ПОДАВЛЯЕТСЯ allowlist'ом — но ТОЛЬКО как явно задокументированное,
# датированное исключение с указанием reason и issue_link, а не молчаливо.
# expires_at (~квартал) — это триггер повторной оценки, не формальность:
# через квартал CI снова покраснеет на этих записях, пока их не продлят/не разберут.
#
# Обязательные поля записи: id, package, reason, expires_at. Необязательное: issue_link.
# id — идентификатор уязвимости из отчёта pip-audit (PYSEC-.../CVE-.../GHSA-...);
#       совпадение проверяется также по aliases уязвимости.
#
# Обоснования ниже — per-CVE: для каждой указано, ПОЧЕМУ уязвимый code path
# недостижим/смягчён именно в XTTS Studio (локальный TTS на XTTS v2 + RVC + GGUF LLM):
#   • torch.load/untrusted-checkpoint RCE — смягчены моделью доверия проекта:
#     XTTS-модели собственные/пиннутые; RVC .pth требует подтверждённого пользователем
#     доверия, привязанного к SHA-256 байтов (engine/rvc_pipeline.py); embedding cache
#     грузится через weights_only=True; произвольных attacker-чекпоинтов нет.
#   • torch distributed/jit/Inductor/quant/RNN-ops — не используются: только eager
#     inference XTTS/RVC; нет torch.compile, torch.jit, distributed RPC, квантования.
#   • transformers RCE — в НЕиспользуемых классах моделей (MobileViT2/MaskFormer/Trax/
#     Perceiver/Transformer-XL/megatron_gpt2/SEW/SEW-D/HuBERT/X-CLIP/GLM4/LightGlue);
#     грузится только пиннутый локальный XTTS v2, без trust_remote_code на remote-репо.
#   • transformers ReDoS/testing_utils/Trainer — в тестовых/тренировочных/неиспользуемых
#     токенайзерах и процессорах; проект — inference-only, входной текст свой.
#   • pillow — crafted font/image DoS/OOB; приложение НЕ декодирует attacker-контролируемые
#     изображения/шрифты (PIL работает только со штатными UI-ассетами).
#   • msgpack/nltk — нет unpack/resource-loading из attacker-контролируемых источников.

allowlist:
  # ── torch == 2.2.2 (frozen; бамп ломает XTTS v2/RVC-стек) ──────────────────────
  - id: PYSEC-2025-41
    package: torch
    reason: "torch.load RCE (CVE-2025-32434) даже c weights_only=True; смягчено моделью доверия — грузятся только собственные/пиннутые XTTS-модели, RVC .pth под SHA-256-доверием пользователя, embedding cache через weights_only=True; attacker-чекпоинтов нет."
    expires_at: 2026-10-17
    issue_link: https://github.com/advisories/GHSA-53q9-r3pm-6pq6
  - id: PYSEC-2024-259
    package: torch
    reason: "RemoteModule (torch.distributed.rpc) deser RCE (CVE-2024-48063, disputed); distributed RPC не используется — только локальный single-process inference."
    expires_at: 2026-10-17
    issue_link: https://nvd.nist.gov/vuln/detail/CVE-2024-48063
  - id: PYSEC-2026-2286
    package: torch
    reason: "weights_only unpickler RCE через вредоносный .pth + torch.load (CVE-2026-24747); та же модель доверия, что и PYSEC-2025-41 — untrusted-чекпоинты не грузятся."
    expires_at: 2026-10-17
    issue_link: https://github.com/advisories/GHSA-63cw-57p8-fm3p
  - id: PYSEC-2026-139
    package: torch
    reason: "Локальная десериализация в pt2 loading handler (CVE-2026-4538); local-only, pt2-экспорт/загрузка не используются, untrusted-чекпоинтов нет."
    expires_at: 2026-10-17
    issue_link: https://nvd.nist.gov/vuln/detail/CVE-2026-4538
  - id: PYSEC-2025-203
    package: torch
    reason: "DoS в torch.linalg.lu (slice op, CVE-2025-55551); lu не вызывается в XTTS/RVC inference; local DoS only."
    expires_at: 2026-10-17
