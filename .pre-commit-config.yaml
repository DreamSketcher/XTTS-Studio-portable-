# Автоформатирование и линтинг перед каждым коммитом.
# Версии ДОЛЖНЫ совпадать с теми, что закреплены в .github/workflows/ci.yml,
# иначе локально будет "чисто", а в CI проверка упадёт.
repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
