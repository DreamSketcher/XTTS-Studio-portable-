<div style="background:var(--surface-1); border-radius:12px; padding:1rem;">
  <div style="aspect-ratio:16/9; background:var(--surface-2); border:0.5px solid var(--border); border-radius:8px; display:flex; flex-direction:column; justify-content:space-between; padding:20px;">
    <div style="font-size:12px; color:var(--text-muted);">XTTS Studio — demo</div>
    <div style="display:flex; align-items:flex-end; justify-content:center; gap:4px; height:70px;">
      <div style="width:6px;height:24px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:6px;height:48px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:6px;height:36px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:6px;height:60px;background:var(--text-secondary);border-radius:3px;"></div>
      <div style="width:6px;height:30px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:6px;height:44px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:6px;height:20px;background:var(--text-muted);border-radius:3px;"></div>
      <div style="width:2px;height:70px;background:var(--border-strong);margin:0 4px;"></div>
      <div style="width:6px;height:38px;background:var(--text-accent);border-radius:3px;"></div>
      <div style="width:6px;height:58px;background:var(--text-accent);border-radius:3px;"></div>
      <div style="width:6px;height:66px;background:var(--text-accent);border-radius:3px;"></div>
      <div style="width:6px;height:42px;background:var(--text-accent);border-radius:3px;"></div>
      <div style="width:6px;height:52px;background:var(--text-accent);border-radius:3px;"></div>
    </div>
    <div style="text-align:center; font-size:14px; font-weight:500;">Original <span style="color:var(--text-muted); font-weight:400;">→</span> <span style="color:var(--text-accent);">Cloned</span></div>
  </div>

  <div style="display:flex; margin-top:16px; border-radius:var(--radius); overflow:hidden; height:44px;">
    <div style="flex:1; background:var(--bg-warning); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-warning);">0–5с · оригинал</div>
    <div style="width:2px; background:var(--surface-1);"></div>
    <div style="flex:1; background:var(--bg-accent); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-accent);">5–10с · результат</div>
  </div>

  <div style="display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:var(--text-muted);">
    <span>0с</span><span>5с</span><span>10с</span>
  </div>
</div>
