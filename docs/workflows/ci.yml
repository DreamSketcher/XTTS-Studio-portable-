name: CI Pipeline

on:
  push:
    branches: [ main, master, dev, release ]
  pull_request:
    branches: [ main, master, dev, release ]

jobs:
  lint-and-format:
    name: Code Quality (Ruff & Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          # Версии закреплены, чтобы CI был воспроизводим и совпадал с pre-commit
          pip install ruff==0.6.9 black==24.10.0 cryptography==49.0.0 pip-audit==2.10.0

      - name: Run Black formatter check
        run: black --check .

      - name: Run Ruff linter
        run: ruff check .

      - name: Verify security documentation and deterministic SBOM
        run: |
          test -s docs/SECURITY.md -o -s SECURITY.md
          test -s docs/PRIVACY.md -o -s PRIVACY.md
          python tools/generate_sbom.py --output json/sbom.generated.cdx.json
          diff -u json/sbom.cdx.json json/sbom.generated.cdx.json
          python -m json.tool json/sbom.cdx.json > /dev/null
          python -c "from engine.update_signing import verify_manifest_signature; verify_manifest_signature(open('json/version.json','rb').read(), open('json/version.json.sig','rb').read())"

      - name: Enforce runtime vulnerability baseline
        run: |
          pip-audit -r requirements.txt --no-deps --disable-pip --ignore-vuln CVE-2025-3000

  tests:
    name: Pytest Suite (CPU)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          # Ключ зависит от ОС, версии python и содержимого requirements.txt —
          # любое изменение зависимостей автоматически инвалидирует кэш.
          # -v1 на конце можно вручную поднять, если нужно сбросить кэш force'ом.
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}-v1

      - name: Create venv and install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          python -m pip install --upgrade pip
          # Ошибки установки нельзя игнорировать: тесты должны выполняться в
          # окружении, соответствующем release requirements.
          pip install torch==2.11.0 torchaudio==2.11.0 torchvision==0.26.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout ruff==0.6.9 black==24.10.0
        shell: bash

      - name: Install virtual display (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Ensure test runner dependencies
        run: |
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          python -m pip install --quiet pytest pytest-cov pytest-timeout cryptography==49.0.0
        shell: bash

      - name: Run pytest
        run: |
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run --auto-servernum python -m pytest test/ --ignore=test/test_local_llm_client_download.py -v
          else
            python -m pytest test/ --ignore=test/test_local_llm_client_download.py -v
          fi
        shell: bash
