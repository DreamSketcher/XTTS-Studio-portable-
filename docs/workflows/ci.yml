name: CI Pipeline

on:
  push:
    branches: [ main, master, dev, release ]
  pull_request:
    branches: [ main, master, dev, release ]

jobs:
  lint-and-format:
    name: Code Quality (Ruff & Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          # Версии закреплены, чтобы CI был воспроизводим и совпадал с pre-commit
          pip install ruff==0.6.9 black==24.10.0 cryptography==49.0.0 pip-audit==2.10.0 pyyaml==6.0.3

      - name: Run Black formatter check
        run: black --check .

      - name: Run Ruff linter
        run: ruff check .

      - name: Strict ruff gate for new files (TASK-009)
        run: |
          python tools/ruff_new_files_gate.py --base "${GITHUB_BASE_REF:-origin/main}" --root .
        if: github.event_name == 'pull_request'

      - name: Verify security documentation and deterministic SBOM
        run: |
          test -s docs/SECURITY.md -o -s SECURITY.md
          test -s docs/PRIVACY.md -o -s PRIVACY.md
          python tools/generate_sbom.py --output json/sbom.generated.cdx.json
          diff -u json/sbom.cdx.json json/sbom.generated.cdx.json
          python -m json.tool json/sbom.cdx.json > /dev/null
          python -c "from engine.update_signing import verify_manifest_signature; verify_manifest_signature(open('json/version.json','rb').read(), open('json/version.json.sig','rb').read())"

      - name: pip-audit blocking gate (High/Critical CVE with allowlist)
        run: |
          python tools/pip_audit_gate.py \
            --requirements requirements.txt \
            --allowlist .security/pip-audit-allowlist.yml

      - name: Verify requirements.lock freshness (TASK-017)
        run: python tools/check_requirements_lock.py

  tests:
    name: Pytest Suite (CPU)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev libavfilter-dev pkg-config

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install torch==2.2.2 torchaudio==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout cryptography==49.0.0 ruff==0.6.9 black==24.10.0
        shell: bash

      - name: Run pytest
        run: |
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run --auto-servernum python -m pytest test/ --ignore=test/test_local_llm_client_download.py -v
          else
            python -m pytest test/ --ignore=test/test_local_llm_client_download.py -v
          fi
        shell: bash
