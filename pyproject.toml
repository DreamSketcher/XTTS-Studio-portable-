[tool.black]
line-length = 100
target-version = ['py310', 'py311']
include = '\.pyi?$'
exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
  )/
)
'''

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Enable Pyflakes (F) and Pycodestyle (E, W) by default
select = ["E", "F", "W", "I", "N"]
ignore = ["E501"] # Ignore long lines (Black handles formatting)

[tool.ruff.lint.isort]
known-first-party = ["engine"]
