[tool.black]
line-length = 100
target-version = ['py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | python
  | library
  | models
  | outputs
  | logs
  | reference
  | word_rules_backups
)/
'''
# force-exclude уважается даже когда путь передан явно (важно: защищает окружение).
force-exclude = '''
/(
    python
  | library
  | models
  | outputs
  | logs
  | reference
  | word_rules_backups
)/
'''

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "python",
    "library",
    "models",
    "outputs",
    "logs",
    "reference",
    "word_rules_backups",
]

[tool.ruff.lint]
# E, F, W — базовые проверки (Pyflakes + pycodestyle).
# N (pep8-naming) и I (isort) СОЗНАТЕЛЬНО НЕ включаем:
#  - в проекте приняты "локальные константы" ЗАГЛАВНЫМИ внутри функций (N806);
#  - порядок импортов исторический, авто-сортировка сломала бы отложенные импорты.
#
# TASK-009: полный строгий набор E,F,W,B,SIM,UP применяется к НОВЫМ файлам через
# tools/ruff_new_files_gate.py (CI-шаг). Legacy-код ниже пока exempt от B/SIM/UP
# через [tool.ruff.lint.per-file-ignores] (с TODO) — новые файлы нельзя туда
# добавлять без review (тот же gate это проверяет).
select = ["E", "F", "W"]
ignore = [
    "E501", # длинные строки — форматирование делает Black
    "E401", # несколько импортов в одной строке — исторический стиль
    "E402", # импорты не в начале файла — в проекте есть намеренные отложенные импорты
    # E722 (bare except) СНОВА АКТИВНО (TASK-009) — допустимо только в legacy-файлах
    # из per-file-ignores ниже. В новом коде bare except валят сборку.
    "E741", # неоднозначные имена (l) — используются как локальные в lambda/def
    "F401", # "неиспользуемый импорт" — в проекте шаблонные шапки + фасадные __init__
    "F403", # `from module import *` — намеренные реэкспорты в env_setup.py
    "F405", # имя может быть из star-import — следствие намеренных `import *`
    "F811", # повторный импорт (дубли import re/torch) — безвреден, исторический
    "F841", # присвоено но не используется — в проекте много "документирующих" присваиваний
]

[tool.ruff.lint.per-file-ignores]
# TASK-009: legacy-файлы с bare except (E722) — TODO: заменить на конкретные исключения
# и убрать отсюда. НЕ добавлять сюда новые файлы без review — tools/ruff_new_files_gate.py
# в CI падает, если новый файл (added in PR) оказывается в этом списке.
# TODO(cleanup): "engine/gui/chat_window/custom_widgets.py" — убрать bare except
"engine/gui/chat_window/custom_widgets.py" = ["E722"]
# TODO(cleanup): "engine/gui/styles_menu.py" — убрать bare except
"engine/gui/styles_menu.py" = ["E722"]

# F821 (Undefined name) СПЕЦИАЛЬНО оставлен включённым — это ловит настоящие баги
# (обращение к несуществующей переменной). Все найденные F821 уже исправлены в коде.

[tool.pytest.ini_options]
# pythonpath — корень проекта в sys.path, чтобы `from engine... import ...`
# работал при запуске pytest из корня (нужно для CI, где нет PYTHONPATH).
pythonpath = ["."]
# Страховка от зависающих тестов: любой тест дольше 60с падает с трейсбеком,
# а не блокирует весь прогон (и CI). Требует пакет pytest-timeout.
timeout = 60
