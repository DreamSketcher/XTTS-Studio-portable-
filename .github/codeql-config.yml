# Конфигурация CodeQL (TASK-016).
# Bundled-окружение (python/, library/) и пользовательские данные (models/, outputs/,
# library/) — не наш код: не отдавать их на анализ, чтобы не было шума и ложных
# срабатываний на сторонних библиотеках/моделях.
name: "XTTS Studio CodeQL config"

# paths: намеренно не задан. Баг в CodeQL Python-экстракторе (walk_dir /
# exclude_pip_21_3_build_dir_options) падает с NotADirectoryError, если в paths:
# попадает одиночный файл (не директория) — а нам нужно включить gui.py, i18n.py
# и generate_version_manifest.py наравне с engine/tools/test. Без явного paths:
# сканируется всё, что НЕ попало в paths-ignore ниже — этого достаточно.

paths-ignore:
  - python
  - library
  - models
  - outputs
  - reference
  - node_modules
