name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint-and-format:
    name: Code Quality (Ruff & Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          # Версии закреплены, чтобы CI был воспроизводим и совпадал с pre-commit
          pip install ruff==0.6.9 black==24.10.0

      - name: Run Black formatter check
        run: black --check .

      - name: Run Ruff linter
        run: ruff check .

  tests:
    name: Pytest Suite (CPU)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          # Ключ зависит от ОС, версии python и содержимого requirements.txt —
          # любое изменение зависимостей автоматически инвалидирует кэш.
          # -v1 на конце можно вручную поднять, если нужно сбросить кэш force'ом.
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}-v1

      - name: Create venv and install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
            pip install -r requirements.txt || true
          fi
          # Лёгкие зависимости, которые нужны тестам напрямую. Ставятся явно,
          # т.к. requirements.txt выше может частично не установиться (|| true)
          # из-за тяжёлых пакетов (coqui-tts / llama-cpp-python) на голом раннере.
          pip install num2words
          pip install numpy customtkinter pydub pygame
          pip install pytest pytest-cov pytest-timeout ruff==0.6.9 black==24.10.0
        shell: bash

      - name: Install virtual display (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run pytest
        run: |
          source .venv/Scripts/activate 2>/dev/null || source .venv/bin/activate
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run --auto-servernum pytest test/ --ignore=test/test_local_llm_client_download.py -v
          else
            pytest test/ --ignore=test/test_local_llm_client_download.py -v
          fi
        shell: bash
